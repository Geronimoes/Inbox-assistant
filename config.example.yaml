# Inbox Briefing Assistant — Configuration
# Copy this to config.yaml and fill in your values.

# ── Gmail settings ──────────────────────────────────────
gmail:
  credentials_file: "credentials.json"   # OAuth client credentials
  token_file: "token.json"               # Auto-generated after first auth
  your_email: "you@gmail.com"            # Your Gmail address
  
  # Which labels/folders to scan (Gmail label IDs)
  # Default: INBOX. Add others if needed.
  scan_labels:
    - "INBOX"
  
  # How far back to look for new emails (in hours)
  lookback_hours: 24

# ── LLM providers ───────────────────────────────────────
# Configure which LLM provider and model to use for each task.
# You can start with only Anthropic — add other providers later.
#
# To get API keys:
#   Anthropic: https://console.anthropic.com/
#   Google:    https://aistudio.google.com/app/apikey
#   Groq:      https://console.groq.com/keys
llm:
  providers:
    anthropic:
      api_key: "sk-ant-..."              # Anthropic API key
    google:
      api_key: "AIza..."                 # Google AI Studio key (for Gemini)
    groq:
      api_key: "gsk_..."                 # Groq API key (fast + cheap)

  # Which provider/model to use for each task.
  # Recommendation: use a fast/cheap model for classification (high volume),
  # and a more capable model for drafting (quality matters there).
  tasks:
    classification:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001" # Fast + cheap — classifies many emails

    draft_replies:
      provider: "anthropic"
      model: "claude-sonnet-4-6"         # More capable — drafts need good writing

    summarization:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"

    style_profile:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001" # Weekly task — any model works

    attachment_classify:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"

  # Example: switch classification to Groq for lower cost / higher speed
  # tasks:
  #   classification:
  #     provider: "groq"
  #     model: "llama-3.3-70b-versatile"

# ── Briefing settings ──────────────────────────────────
briefing:
  # When to send (used in cron, but also shown in briefing header)
  timezone: "Europe/Amsterdam"           # Adjust to your timezone
  
  # Send briefing as email to yourself
  send_to: "you@gmail.com"              # Where to receive the briefing
  
  # How many FYI items to include (keeps briefing concise)
  max_fyi_items: 10
  
  # Include noise count? (e.g., "14 items archived")
  show_noise_count: true

# ── Obsidian vault output ────────────────────────────────
# When vault_path is set, a Markdown daily note is written to the vault
# on every run. Leave vault_path commented out to disable this feature.
#
# TESTING: Start with a path inside the project to verify the output
# format before pointing it at your real vault:
#   vault_path: "data/obsidian-test"
#
# PRODUCTION: Change to your real vault path once you're happy with it:
#   vault_path: "~/syncthing/data/Notes"
obsidian:
  # vault_path: "data/obsidian-test"       # ← uncomment to enable (test path)
  # vault_path: "~/syncthing/data/Notes"   # ← switch to this for real vault
  briefing_folder: "inbox-briefings"       # subfolder created inside the vault

# ── Dashboard ───────────────────────────────────────────
# By default the dashboard is written to dashboard/index.html inside this
# project. Set output_path to write it directly to your web server's
# static files directory so it's always up to date without any syncing.
dashboard:
  output_path: ""   # e.g. "/home/jeroen/caddy/sites/inbox-dashboard/index.html"

# ── Draft reply settings ────────────────────────────────
drafts:
  enabled: true                          # Set false to disable draft creation entirely
  save_to_gmail: false                   # Save drafts to Gmail Drafts folder
                                         # Set false if you reply from a different
                                         # account (e.g. university email)
                                         # Drafts are always included in the briefing
                                         # email and Obsidian note regardless.

  # Language handling
  reply_language: "match"                # "match" = reply in sender's language
                                         # "en" = always English
                                         # "nl" = always Dutch
  
  # Add a note to drafts so you know they're AI-generated
  draft_prefix: "[AI Draft] "            # Prepended to draft subject lines
  
  # Formality levels by sender type
  # Options: formal, professional, warm, casual
  default_tone: "professional"
  tone_overrides:
    - match: "students"                  # PhD students, TAs
      tone: "warm"
    - match: "editors"                   # Journal editors
      tone: "formal"
    - match: "admin"                     # University administration
      tone: "professional"

# ── Notifications ───────────────────────────────────────
# Telegram bot sends urgent alerts and a morning briefing ping.
# To set up: create a bot via @BotFather, get the chat_id by messaging
# @userinfobot, then fill in both values below.
#
# If Telegram is not configured, urgent alerts fall back to email.
notifications:
  telegram:
    bot_token: "123456:ABC-DEF..."    # From @BotFather
    chat_id: "987654321"              # Your personal chat ID (from @userinfobot)

# ── Urgent alerts ───────────────────────────────────────
alerts:
  enabled: true
  
  # How often to check (used in cron setup)
  check_interval_hours: 2
  
  # Only alert during these hours (24h format)
  quiet_hours_start: 21                  # 9 PM — no alerts after this
  quiet_hours_end: 7                     # 7 AM — no alerts before this
  
  # Alert method: "email" sends an email with ⚡ subject prefix
  method: "email"
  alert_to: "you@gmail.com"

# ── Archive behavior ────────────────────────────────────
archive:
  auto_archive_noise: false              # Set true to auto-archive noise
  # Even when true, only archives:
  # - Promotional emails
  # - Automated notifications
  # - Mailing list digests
  # Never archives anything classified as ACTION or above.

# ── Logging ─────────────────────────────────────────────
logging:
  level: "INFO"                          # DEBUG, INFO, WARNING, ERROR
  file: "logs/assistant.log"
  max_size_mb: 10
  backup_count: 5

# ── Project email archiver ───────────────────────────────────────────────────
# Saves emails related to specific projects as individual Markdown files in
# your Obsidian vault. Each email becomes its own note with full metadata
# (date, from, to, cc, subject, thread ID) in YAML frontmatter, so you can
# use Obsidian Dataview to query and group them.
#
# Matching: an email is included if the subject contains any keyword (case-
# insensitive) OR any collaborator name/email fragment appears in from/to/cc.
#
# Usage:
#   python src/project_fetch.py               # export all projects (last 24h)
#   python src/project_fetch.py --all         # backfill full history (up to 500)
#   python src/project_fetch.py --hours 72    # custom lookback window
#   python src/project_fetch.py --project my-project-id
#   python src/project_fetch.py --dry-run     # preview without writing
#
# Optional cron (add manually once you've verified output looks right):
#   0 20 * * * cd /path/to/inbox-assistant && env/bin/python src/project_fetch.py >> logs/project-fetch.log 2>&1
#
# NOTE: The Gmail API returns at most 500 emails per call. For very large
# inboxes a full --all backfill may miss older emails. This is a known
# limitation; pagination support is a future enhancement.
projects:
  - id: my-project                       # Used for --project flag and state tracking
    name: "My Project"                   # Human-readable name shown in log output
    vault_folder: "project-context/my-project"  # Path relative to obsidian.vault_path
    since: "2025-01-01"                  # Optional: only fetch emails on or after this date
                                         # Useful for long-running projects to avoid old noise
                                         # Format: YYYY-MM-DD
    attachment_max_size_mb: 7            # Optional: download attachments up to this size (MB)
                                         # They are saved in vault_folder/assets/ and linked in
                                         # the note. Omit this line entirely to skip attachments.
    exclude_extensions:                  # Optional: attachment file types to skip.
      - ".ics"                           # Inline images (signatures, logos) are always skipped
                                         # automatically via Content-Disposition — no need to list
                                         # image extensions here unless you want to skip ALL images.
    keywords:                            # Match against email subject (case-insensitive)
      - "Project Name"
      - "COURSE123"
    collaborators:                       # Match against from/to/cc fields
      - name: "Alice Smith"              # Full name — matched as substring (case-insensitive)
        email_fragment: "alice.smith"    # Optional: partial email address to match
      - name: "Bob Jones"
        # email_fragment omitted — name-only match
    # scan_labels:                       # Optional: override global gmail.scan_labels
    #   - "_UCM-redirect"
    #   - "INBOX"
